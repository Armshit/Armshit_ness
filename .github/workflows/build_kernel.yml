name: Build Android Kernel (Platina)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Lingkungan & Dependensi
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libelf-dev

    - name: Unduh Source Code Kernel & Clang Compiler
      run: |
        # Mengunduh Source Kernel LineageOS untuk Snapdragon 660 (platina)
        git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sdm660.git -b lineage-18.1 kernel-source
        
        # Mengunduh Proton Clang (Compiler modern yang optimal untuk kernel Android)
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

    - name: Mulai Kompilasi Kernel
      run: |
        cd kernel-source
        
        # Menghubungkan compiler ke sistem PATH
        export PATH=$(pwd)/../clang/bin:$PATH
        
        # Pengaturan arsitektur dan compiler yang digunakan
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        
        # 1. Membuat file konfigurasi bawaan Mi 8 Lite (platina_defconfig)
        make O=out platina_defconfig
        
        # 2. Proses kompilasi menggunakan semua core CPU server yang tersedia (-j$(nproc))
        make O=out CC=clang -j$(nproc)

    - name: Unggah Hasil Kernel (Image.gz-dtb)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Mi8Lite-Platina
        path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
        
